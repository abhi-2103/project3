<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GoFast Ride Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">🚗 GoFast</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="book.html">Book Ride</a></li>
        <li class="nav-item"><a class="nav-link" href="myrides.html">My Rides</a></li>
        <li class="nav-item"><a class="nav-link" href="support.html">Support</a></li>
      </ul>

      <div class="d-flex">
        <a href="login.html" class="btn btn-outline-light me-2">Login</a>
        <a href="signup.html" class="btn btn-success">Sign Up</a>
      </div>

    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero text-center text-white">
    <h1>Book Your Ride Instantly</h1>
    <p>Fast, Safe and Affordable rides</p>

    <div class="container booking-box shadow">
        <div class="row g-2">
            <div class="col-md-4">
                <input type="text" class="form-control" id="pickup" placeholder="Pickup Location">
            </div>
            <div class="col-md-4">
                <input type="text" class="form-control" id="drop" placeholder="Drop Location">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="bookRide()">Book</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="rideModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      
      <div class="modal-header">
        <h5 class="modal-title">Ride Confirmation</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body" id="modalText"></div>

      <div class="modal-footer">
        <button class="btn btn-success" data-bs-dismiss="modal">OK</button>
      </div>

    </div>
  </div>
</div>

<!-- CAROUSEL -->
<div id="carouselExampleSlidesOnly" class="carousel slide mt-4" data-bs-ride="carousel">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="p1.jpg" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="p2.jpg" class="d-block w-100">
    </div>
    <div class="carousel-item">
      <img src="p3.jpg" class="d-block w-100">
    </div>
  </div>
</div>

<!-- FEATURES -->
<div class="container text-center mt-5">
    <h2>Why Choose GoFast?</h2>
    <div class="row mt-4">
        <div class="col-md-4">
            <h4>🚀 Fast Booking</h4>
            <p>Book rides instantly.</p>
        </div>
        <div class="col-md-4">
            <h4>🔒 Safe</h4>
            <p>Verified drivers.</p>
        </div>
        <div class="col-md-4">
            <h4>💰 Affordable</h4>
            <p>Best pricing.</p>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 GoFast
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script>
function bookRide() {
    let pickup = document.getElementById("pickup").value.trim();
    let drop = document.getElementById("drop").value.trim();

    if (pickup === "" || drop === "") {
        alert("⚠ Please enter both Pickup and Drop locations!");
        return;
    }

    document.getElementById("modalText").innerHTML =
        `✅ Ride booked from <b>${pickup}</b> to <b>${drop}</b> 🚗`;

    let modal = new bootstrap.Modal(document.getElementById('rideModal'));
    modal.show();
}
</script>

</body>
</html>
